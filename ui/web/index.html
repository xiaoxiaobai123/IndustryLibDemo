<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IndustryLibDemo · 工业视觉仪表盘</title>
<style>
  :root{
    --bg:#14171c; --panel:#1d2129; --ok:#3ddc84; --ng:#ff5252;
    --fg:#e6e9ef; --muted:#8b94a3; --line:#2a303c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font:14px/1.5 "Segoe UI",system-ui,sans-serif;padding:20px}
  .wrap{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:14px}

  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  h1{font-size:17px;font-weight:600;letter-spacing:.3px}
  .tag{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:2px 10px}
  .spacer{flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ng);
       box-shadow:0 0 0 4px rgba(255,82,82,.15);transition:.3s}
  .dot.up{background:var(--ok);box-shadow:0 0 0 4px rgba(61,220,132,.15)}
  button{background:var(--line);color:var(--fg);border:0;border-radius:6px;
         padding:8px 18px;font-size:13px;cursor:pointer;transition:.15s}
  button:hover{background:#39414f}
  button.primary{background:rgba(61,220,132,.14);color:var(--ok)}
  button.primary:hover{background:rgba(61,220,132,.24)}
  button.danger{background:rgba(255,82,82,.14);color:var(--ng)}
  button.danger:hover{background:rgba(255,82,82,.24)}

  .grid{display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr;gap:14px}
  .card{background:var(--panel);border-radius:10px;padding:16px 18px;border:1px solid rgba(255,255,255,.04)}
  .card h2{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .big{font-size:32px;font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums}
  .lamp{grid-row:span 1;display:flex;flex-direction:column;align-items:center;justify-content:center;
        min-height:132px;transition:background .2s}
  #lampText{font-size:56px;font-weight:800;letter-spacing:2px;color:var(--muted)}
  .lamp.ok{background:rgba(61,220,132,.08)} .lamp.ok #lampText{color:var(--ok)}
  .lamp.ng{background:rgba(255,82,82,.08)}  .lamp.ng #lampText{color:var(--ng)}
  .sub{font-size:12px;color:var(--muted);margin-top:4px}

  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  th{font-size:11px;color:var(--muted);text-align:left;font-weight:500;
     padding:8px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
  td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px}
  .scroll{max-height:340px;overflow-y:auto}
  .pill{padding:1px 9px;border-radius:99px;font-size:11px;font-weight:700}
  .pill.OK{background:rgba(61,220,132,.15);color:var(--ok)}
  .pill.NG{background:rgba(255,82,82,.15);color:var(--ng)}
  tr.new{animation:flash .6s}
  @keyframes flash{from{background:rgba(255,255,255,.05)}to{background:transparent}}
  @media(max-width:820px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>IndustryLibDemo</h1>
    <span class="tag">分层架构演示</span>
    <span class="spacer"></span>
    <span class="dot" id="dot"></span>
    <span id="connText" style="color:var(--muted)">未连接</span>
    <button class="primary" onclick="cmd('start')">启动</button>
    <button class="danger" onclick="cmd('stop')">停止</button>
    <button onclick="cmd('status')">状态</button>
  </header>

  <div class="grid">
    <div class="card lamp" id="lamp"><div id="lampText">--</div><div class="sub" id="lampSub">等待数据</div></div>
    <div class="card"><h2>OK 计数</h2><div class="big" style="color:var(--ok)" id="okN">0</div></div>
    <div class="card"><h2>NG 计数</h2><div class="big" style="color:var(--ng)" id="ngN">0</div></div>
    <div class="card"><h2>良率</h2><div class="big" id="rate">--</div><div class="sub" id="frames">0 帧</div></div>
  </div>

  <div class="card" style="padding:0">
    <div class="scroll">
      <table>
        <thead><tr><th>帧号</th><th>流程</th><th>主指标</th><th>判定</th><th>详情</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let ok = 0, ng = 0, frames = new Set();
const $ = id => document.getElementById(id);

function cmd(c){ fetch('/cmd', {method:'POST', body:c}); }

function setLink(up){
  $('dot').classList.toggle('up', up);
  $('connText').textContent = up ? '已连接 core 127.0.0.1:9500' : '未连接';
}

function onResult(m){
  const isOK = m.verdict === 'OK';
  $('lamp').className = 'card lamp ' + (isOK ? 'ok' : 'ng');
  $('lampText').textContent = m.verdict;
  $('lampSub').textContent = m.score !== undefined
      ? `${m.flow} · score ${m.score}` : `${m.flow} · angle ${m.angle}°`;

  isOK ? $('okN').textContent = ++ok : $('ngN').textContent = ++ng;
  frames.add(m.frame);
  $('frames').textContent = frames.size + ' 帧';
  $('rate').textContent = ((ok / (ok + ng)) * 100).toFixed(1) + '%';

  // 各流程私有字段：grade(A) / band(B) —— 体现流程输出结构不同
  // 各项目主指标不同：表面检测看 score，角度测量看 angle
  const metric = m.score !== undefined ? m.score : `${m.angle}°`;
  const extra = [m.grade && `grade=${m.grade}`,
                 m.threshold && `th≥${m.threshold}`,
                 m.direction && `dir=${m.direction}`,
                 m.tolerance && `tol=±${m.tolerance}°`,
                 m.confidence !== undefined && `conf=${m.confidence}`]
                .filter(Boolean).join('  ');
  const tr = document.createElement('tr');
  tr.className = 'new';
  tr.innerHTML = `<td>${m.frame}</td><td>${m.flow}</td><td>${metric}</td>
                  <td><span class="pill ${m.verdict}">${m.verdict}</span></td>
                  <td style="color:var(--muted)">${extra}</td>`;
  const rows = $('rows');
  rows.prepend(tr);
  while (rows.children.length > 200) rows.lastChild.remove();
}

new EventSource('/events').onmessage = e => {
  let m; try { m = JSON.parse(e.data); } catch { return; }
  if (m.type === 'link')        setLink(m.connected);
  else if (m.type === 'result') onResult(m);
  else if (m.type === 'status') $('lampSub').textContent =
      `build ${m.build} · ${m.flow_count} 个流程 · ${m.running ? '运行中' : '已停止'}`;
};
</script>
</body>
</html>
